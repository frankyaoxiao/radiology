# Raw-MSE with RMSProp optimizer, seed 0
run_name: raw_rmsprop_s0
runs_root: /resnick/groups/CS156b/from_central/2026/scalm_akumarap/runs

data_root: /resnick/groups/CS156b/from_central/data
labels_csv: /resnick/groups/CS156b/from_central/data/student_labels/train2023.csv
test_ids_csv: /resnick/groups/CS156b/from_central/data/student_labels/test_ids.csv
val_frac: 0.1
split_seed: 42

image_size: 224
crop_scale_min: 0.9
crop_scale_max: 1.0
rotation_deg: 10.0
brightness: 0.2
contrast: 0.2

model_type: densenet121
dropout: 0.5

target_type: raw
loss_fn: mse
blank_strategy: ignore

optimizer: rmsprop
rmsprop_momentum: 0.9
rmsprop_alpha: 0.99

epochs: 8
batch_size_per_gpu: 32
num_workers: 8
lr_head: 5.0e-4
lr_backbone: 5.0e-5
weight_decay: 1.0e-5
warmup_ratio: 0.05
grad_clip: 1.0
mixup_alpha: 0.0
loss_reduction: micro

eval_every_steps: 2000
primary_metric: nmse

seed: 0
log_every_steps: 20
