# Score-aligned objective experiment.
#
# The leaderboard excludes blank/unmentioned labels. This run therefore masks
# both uncertain and blank labels from the training loss and validation metric,
# rather than treating blanks as negatives. The loss macro-averages labels so
# sparse scored labels are not drowned out by dense labels.

run_name: v5_score_aligned
runs_root: /resnick/groups/CS156b/from_central/2026/scalm_akumarap/runs

# data
data_root: /resnick/groups/CS156b/from_central/data
labels_csv: /resnick/groups/CS156b/from_central/data/student_labels/train2023.csv
test_ids_csv: /resnick/groups/CS156b/from_central/data/student_labels/test_ids.csv
val_frac: 0.1
split_seed: 42

# image
image_size: 768
crop_scale_min: 0.85
crop_scale_max: 1.0
rotation_deg: 10.0
brightness: 0.2
contrast: 0.2

# labels
default_uncertain_strategy: ignore
blank_strategy: ignore

# model
dinov3_repo: /resnick/groups/CS156b/from_central/2026/scalm_akumarap/dinov3_repo
dinov3_arch: dinov3_vith16plus
dinov3_weights: /resnick/groups/CS156b/from_central/2026/scalm_akumarap/dinov3_hplus.pth
head_type: attention
attn_pool_heads: 8

# optimization
epochs: 5
batch_size_per_gpu: 8
num_workers: 8
lr_head: 2.0e-5
lr_backbone: 1.0e-6
weight_decay: 0.05
warmup_ratio: 0.05
grad_clip: 1.0
mixup_alpha: 0.0
loss_reduction: macro

# eval / ckpt
eval_every_steps: 500
primary_metric: nmse

# misc
seed: 0
log_every_steps: 20
