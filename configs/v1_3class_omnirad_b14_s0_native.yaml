# OmniRad-base at native pretraining resolution (224x224), no pos-embed interp.
# Same as v1_3class_omnirad_b14_s0.yaml except image_size=224.

run_name: v1_3class_omnirad_b14_s0_native
runs_root: /data/artifacts/frank/misc/runs

# data
data_root: /data/artifacts/frank/misc
labels_csv: /data/artifacts/frank/misc/labels/train2023.csv
test_ids_csv: /data/artifacts/frank/misc/labels/test_ids.csv
val_frac: 0.1
split_seed: 42

# image — native pretraining resolution
image_size: 224
crop_scale_min: 0.9
crop_scale_max: 1.0
rotation_deg: 10.0
brightness: 0.2
contrast: 0.2

# model
model_type: radio_dino
rad_dino_path: hf_hub:Snarcy/OmniRad-base
head_type: cls
dropout: 0.3

# loss / target
target_type: 3class
loss_fn: ce

# optimization
epochs: 8
batch_size_per_gpu: 16
num_workers: 8
lr_head: 1.0e-3
lr_backbone: 1.0e-6
weight_decay: 1.0e-4
warmup_ratio: 0.05
grad_clip: 1.0
mixup_alpha: 0.0

# eval / ckpt
eval_every_steps: 2000
primary_metric: nmse

# misc
seed: 0
log_every_steps: 20
