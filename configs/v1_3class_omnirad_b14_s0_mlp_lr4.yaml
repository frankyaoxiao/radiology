# OmniRad-448 + MLP head + lr_head=1e-4 (combining the MLP architectural change with the
# lr_head finding from om_B). Single change vs the s0 baseline.

run_name: v1_3class_omnirad_b14_s0_mlp_lr4
runs_root: /data/artifacts/frank/misc/runs
data_root: /data/artifacts/frank/misc
labels_csv: /data/artifacts/frank/misc/labels/train2023.csv
test_ids_csv: /data/artifacts/frank/misc/labels/test_ids.csv
val_frac: 0.1
split_seed: 42
image_size: 448
crop_scale_min: 0.9
crop_scale_max: 1.0
rotation_deg: 10.0
brightness: 0.2
contrast: 0.2
model_type: radio_dino
rad_dino_path: hf_hub:Snarcy/OmniRad-base
head_type: mlp
head_hidden_dim: 512
dropout: 0.3
target_type: 3class
loss_fn: ce
epochs: 8
batch_size_per_gpu: 16
num_workers: 8
lr_head: 1.0e-4         # 10x lower than baseline; matches om_B finding
lr_backbone: 1.0e-6
weight_decay: 1.0e-4
warmup_ratio: 0.05
grad_clip: 1.0
mixup_alpha: 0.0
eval_every_steps: 2000
primary_metric: nmse
seed: 0
log_every_steps: 20
