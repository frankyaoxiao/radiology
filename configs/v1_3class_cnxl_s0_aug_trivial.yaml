# DINOv3 ConvNeXt-Large (196M, LVD-1689M) + 3-class CE.
# Uses the existing CheXpertDINOv3Model wrapper since ConvNeXt's forward_features
# returns the same dict structure as ViT (Meta's deliberate API compat).

run_name: v1_3class_cnxl_s0_aug_trivial
runs_root: /data/artifacts/frank/misc/runs

# data
data_root: /data/artifacts/frank/misc
labels_csv: /data/artifacts/frank/misc/labels/train2023.csv
test_ids_csv: /data/artifacts/frank/misc/labels/test_ids.csv
val_frac: 0.1
split_seed: 42

# image
image_size: 448
crop_scale_min: 0.9
crop_scale_max: 1.0
rotation_deg: 10.0
brightness: 0.2
contrast: 0.2

# model
model_type: dinov3
dinov3_repo: /data/artifacts/frank/misc/dinov3_repo
dinov3_arch: dinov3_convnext_large
dinov3_weights: /data/artifacts/frank/misc/labels/dino/dinov3_convnext_large.pth
head_type: cls
head_dropout: 0.3

# loss / target
target_type: 3class
loss_fn: ce

# optimization (same recipe family as v1_3class_b16_s0_drop)
epochs: 8
batch_size_per_gpu: 4    # 4 GPUs * bs=4 = effective 16 (matches single-GPU OmniRad/B16 recipe)
num_workers: 8
lr_head: 1.0e-3
lr_backbone: 1.0e-6
weight_decay: 1.0e-4
warmup_ratio: 0.05
grad_clip: 1.0
mixup_alpha: 0.0

# eval / ckpt
eval_every_steps: 2000
primary_metric: nmse

seed: 0
log_every_steps: 20
augmentation: trivial
